<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>寶寶識字連連看 - 主選單</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="shared/styles.css">
</head>
<body class="bg-slate-50 font-sans select-none">

  <div class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="mb-8 text-center">
      <h1 class="text-4xl md:text-5xl font-black text-blue-600 mb-3 tracking-wider">
        寶寶識字連連看
      </h1>
      <div class="inline-block">
        <span class="text-sm bg-blue-100 text-blue-600 px-3 py-1.5 rounded-full border border-blue-200 inline-flex items-center gap-1 font-bold">
          ✨ AI 老師版
        </span>
      </div>
      <p class="text-slate-500 text-lg font-medium mt-3">快樂學習認字 · 適合 3-6 歲</p>
    </div>

    <div class="w-full max-w-4xl bg-white rounded-3xl shadow-xl border-4 border-blue-100 p-6 md:p-10">

      <h2 class="text-2xl font-bold text-slate-700 mb-6 text-center">請選擇遊戲模式</h2>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">

        <a href="basic.html"
           class="group flex flex-col items-center justify-center p-6 bg-blue-50 hover:bg-blue-100 rounded-2xl border-4 border-blue-200 hover:border-blue-400 transition-all transform hover:scale-105 active:scale-95 shadow-sm">
          <div class="text-6xl md:text-7xl mb-3 group-hover:scale-110 transition-transform">🧩</div>
          <h3 class="text-2xl font-black text-blue-700 mb-2">連連看</h3>
          <p class="text-sm text-slate-600 text-center leading-relaxed">
            點選配對國字和圖片<br />
            還可以聽 AI 老師造句
          </p>
        </a>

        <a href="advanced.html"
           class="group flex flex-col items-center justify-center p-6 bg-purple-50 hover:bg-purple-100 rounded-2xl border-4 border-purple-200 hover:border-purple-400 transition-all transform hover:scale-105 active:scale-95 shadow-sm">
          <div class="text-6xl md:text-7xl mb-3 group-hover:scale-110 transition-transform">👂</div>
          <h3 class="text-2xl font-black text-purple-700 mb-2">聽音辨字</h3>
          <p class="text-sm text-slate-600 text-center leading-relaxed">
            聽聲音四選一<br />
            選出正確的國字
          </p>
        </a>

        <a href="shooter.html"
           class="group flex flex-col items-center justify-center p-6 bg-red-50 hover:bg-red-100 rounded-2xl border-4 border-red-200 hover:border-red-400 transition-all transform hover:scale-105 active:scale-95 shadow-sm">
          <div class="text-6xl md:text-7xl mb-3 group-hover:scale-110 transition-transform">🚀</div>
          <h3 class="text-2xl font-black text-red-700 mb-2">打幽靈</h3>
          <p class="text-sm text-slate-600 text-center leading-relaxed">
            操縱戰鬥機射擊幽靈<br />
            練習識字反應力
          </p>
        </a>

      </div>

      <div class="mt-8 pt-6 border-t-2 border-slate-100 text-center">
        <p class="text-sm text-slate-400">
          題庫：K1B-1 (16字) · K1B-2 (13字)
        </p>
      </div>

    </div>

    <div class="mt-6 text-slate-400 text-xs text-center max-w-lg">
      © Osmond Frobel Chi · 適合年齡：3-6 歲
    </div>

  </div>

</body>
</html>
