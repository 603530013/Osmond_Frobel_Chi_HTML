<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>寶寶識字連連看</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 搖晃動畫設定 */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .animate-shake {
      animation: shake 0.3s ease-in-out;
    }
    /* 隱藏捲軸保持版面乾淨 */
    body {
      overflow-x: hidden;
    }
  </style>
</head>
<body class="bg-slate-50 font-sans select-none">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 圖示元件 ---
    const Play = ({className, fill="none"}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
    const RotateCcw = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>;
    const Star = ({className, fill="none"}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>;
    const Trophy = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>;
    const Sparkles = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>;
    const Loader2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>;
    const X = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>;
    const Check = ({className, strokeWidth}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth || "2"} strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"></path></svg>;
    const Home = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
    const Volume2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>;

    // API Key (如果需要在本機端呼叫 AI 老師，請將 API Key 填入下方雙引號中)
    const apiKey = "";

    // 遊戲資料設定 (多群組題庫)
    const WORD_SETS = {
      'K1B-1': [
        { id: 'wind', char: '風', icon: '🌬️', color: 'bg-blue-100 text-blue-600', label: '風車' },
        { id: 'water', char: '水', icon: '🥛', color: 'bg-cyan-100 text-cyan-600', label: '水杯有水' },
        { id: 'high', char: '高', icon: '👠', color: 'bg-pink-100 text-pink-600', label: '高跟鞋' },
        { id: 'needle', char: '針', icon: '💉', color: 'bg-slate-200 text-slate-600', label: '針筒' },
        { id: 'hand', char: '手', icon: '✋', color: 'bg-amber-100 text-amber-700', label: '手掌' },
        { id: 'ball', char: '球', icon: '🏀', color: 'bg-orange-100 text-orange-600', label: '籃球' },
        { id: 'cow', char: '牛', icon: '🐄', color: 'bg-stone-200 text-stone-800', label: '乳牛' },
        { id: 'small', char: '小', type: 'custom-dogs-small', color: 'bg-green-100 text-green-700', label: '小狗' },
        { id: 'big', char: '大', type: 'custom-dogs-big', color: 'bg-red-100 text-red-700', label: '大狗' },
        { id: 'flower', char: '花', icon: '🌺', color: 'bg-rose-100 text-rose-600', label: '花朵' },
        { id: 'tea', char: '茶', icon: '🍵', color: 'bg-emerald-100 text-emerald-700', label: '茶壺' },
        { id: 'box', char: '盒', icon: '🎁', color: 'bg-purple-100 text-purple-600', label: '禮物盒' },
        { id: 'eye', char: '眼', icon: '👁️', color: 'bg-yellow-100 text-yellow-800', label: '眼睛' },
        { id: 'door', char: '門', icon: '🚪', color: 'bg-orange-200 text-orange-900', label: '門窗' },
        { id: 'paper', char: '紙', icon: '📄', color: 'bg-gray-100 text-gray-600', label: '紙張' },
        { id: 'jump', char: '跳', type: 'custom-jump', color: 'bg-fuchsia-100 text-fuchsia-600', label: '跳繩' },
      ],
      'K1B-2': [
        { id: 'old', char: '老', icon: '👴', color: 'bg-indigo-100 text-indigo-600', label: '老人' },
        { id: 'teacher', char: '師', icon: '🧑‍🏫', color: 'bg-purple-100 text-purple-600', label: '老師' },
        { id: 'soil', char: '土', type: 'custom-soil', color: 'bg-yellow-200 text-yellow-900', label: '泥土' },
        { id: 'person', char: '人', icon: '🚶', color: 'bg-teal-100 text-teal-600', label: '人類' },
        { id: 'sleep', char: '睡', icon: '🛌', color: 'bg-blue-200 text-blue-800', label: '躺在床上睡覺的人' },
        { id: 'circle', char: '圓', icon: '⭕', color: 'bg-red-100 text-red-600', label: '圓形' },
        { id: 'grass', char: '草', icon: '🌿', color: 'bg-green-100 text-green-700', label: '草地' },
        { id: 'rice', char: '飯', icon: '🍚', color: 'bg-stone-100 text-stone-700', label: '吃飯' },
        { id: 'pudding', char: '布', icon: '🍮', color: 'bg-yellow-100 text-yellow-700', label: '布丁' },
        { id: 'trophy', char: '杯', icon: '🏆', color: 'bg-amber-100 text-amber-600', label: '獎杯' },
        { id: 'bird', char: '鳥', icon: '🐦', color: 'bg-sky-100 text-sky-700', label: '小鳥' },
        { id: 'crow', char: '烏', icon: '🐦‍⬛', color: 'bg-zinc-200 text-zinc-800', label: '烏鴉' }
      ]
    };

    // Helper: 呼叫 Gemini 生成造句
    const generateSentenceWithGemini = async (word) => {
      try {
        if (!apiKey) return `(未設定 API Key) 這是${word}。`;
        const response = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{
                parts: [{ text: `請用「${word}」這個字，造一個非常簡單、生動、適合3歲小孩聽的短句。限制15個字以內。只要回傳句子就好，不要其他文字。` }]
              }]
            })
          }
        );
        const data = await response.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text || `這是${word}。`;
      } catch (error) {
        console.error("Gemini Text Error:", error);
        return `這是${word}。`;
      }
    };

    // Helper: 呼叫 Gemini TTS 朗讀 (若無則使用內建)
    const speakText = async (text) => {
      try {
        if (!apiKey) throw new Error("No API Key");
        const response = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: text }] }],
              generationConfig: {
                responseModalities: ["AUDIO"],
                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
              }
            })
          }
        );
        const data = await response.json();
        const audioContent = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
        if (audioContent) {
          const audio = new Audio(`data:audio/mp3;base64,${audioContent}`);
          audio.play();
        }
      } catch (error) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-TW';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
      }
    };

    // 特殊組件：顯示兩隻狗並標示大或小
    const DogComparison = ({ target }) => {
      return (
        <div className="flex items-end justify-center gap-4 h-full w-full pb-2 px-1">
          <div className="relative flex items-center justify-center">
            <span className="text-3xl transform translate-y-1">🐕</span>
            {target === 'small' && (
               <div className="absolute -inset-3 border-4 border-red-500 rounded-full animate-pulse pointer-events-none"></div>
            )}
          </div>
          <div className="relative flex items-center justify-center ml-2">
            <span className="text-6xl">🐕</span>
            {target === 'big' && (
               <div className="absolute -inset-2 border-4 border-red-500 rounded-full animate-pulse pointer-events-none"></div>
            )}
          </div>
        </div>
      );
    };

    // 特殊組件：顯示原地跳躍
    const JumpVisual = () => {
      return (
        <div className="flex flex-col items-center justify-center h-full w-full">
          <div className="relative animate-bounce">
            <div className="absolute -top-6 left-0 right-0 text-center">
               <span className="text-2xl text-fuchsia-500 font-black">↑</span>
            </div>
            <span className="text-6xl">🧍</span>
          </div>
          <div className="w-12 h-1.5 bg-slate-200 rounded-full mt-1 opacity-50 scale-x-75 animate-pulse"></div>
        </div>
      );
    };

    // 特殊組件：小土堆
    const SoilVisual = () => {
      return (
        <div className="flex flex-col items-center justify-center h-full w-full">
          <svg width="60" height="60" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" className="drop-shadow-sm">
            <path d="M 4 56 C 4 56, 12 48, 32 48 C 52 48, 60 56, 60 56 Z" fill="#5C4033" />
            <path d="M 12 52 C 12 52, 20 20, 36 20 C 50 20, 54 52, 54 52 Z" fill="#8B5A2B" />
            <path d="M 22 54 C 22 54, 28 32, 44 32 C 54 32, 58 54, 58 54 Z" fill="#A0522D" />
            <circle cx="34" cy="34" r="2" fill="#3E2723" opacity="0.6"/>
            <circle cx="44" cy="42" r="2.5" fill="#3E2723" opacity="0.6"/>
            <circle cx="28" cy="46" r="1.5" fill="#3E2723" opacity="0.6"/>
            <circle cx="48" cy="48" r="1.5" fill="#3E2723" opacity="0.6"/>
            <circle cx="38" cy="50" r="2" fill="#3E2723" opacity="0.6"/>
          </svg>
        </div>
      );
    };

    // AI 互動泡泡組件
    const AIBubble = ({ text, onClose }) => {
      return (
        <div className="absolute z-50 top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-64 bg-white rounded-2xl shadow-2xl border-4 border-blue-200 p-4 animate-in fade-in zoom-in duration-300">
          <div className="flex justify-between items-start mb-2">
            <div className="flex items-center gap-2 text-blue-600 font-bold">
              <Sparkles className="w-5 h-5 fill-blue-500" />
              <span>AI 老師說...</span>
            </div>
            <button onClick={onClose} className="text-slate-400 hover:text-slate-600">
              <X className="w-5 h-5" />
            </button>
          </div>
          <p className="text-xl font-medium text-slate-700 leading-relaxed text-center">
            {text}
          </p>
        </div>
      );
    };

    const App = () => {
      // 模式與共用狀態
      const [gameMode, setGameMode] = useState('basic'); 
      const [selectedSets, setSelectedSets] = useState([]);
      const [questionCount, setQuestionCount] = useState(0);
      const [gamePool, setGamePool] = useState([]); 
      const [level, setLevel] = useState(0);
      const [gameState, setGameState] = useState('intro');
      const [wrongShake, setWrongShake] = useState(null);
      
      // 計算答對率與星星數狀態
      const [attempts, setAttempts] = useState({ correct: 0, total: 0 });

      // 初階連連看狀態
      const [currentWords, setCurrentWords] = useState([]);
      const [rightSideItems, setRightSideItems] = useState([]);
      const [selection, setSelection] = useState(null);
      const [matches, setMatches] = useState([]);
      const [lines, setLines] = useState([]);
      const [aiLoading, setAiLoading] = useState(null);
      const [aiResponse, setAiResponse] = useState(null);

      const containerRef = useRef(null);
      const leftRefs = useRef({});
      const rightRefs = useRef({});

      // 進階聽音辨字狀態
      const [advTarget, setAdvTarget] = useState(null);
      const [advOptions, setAdvOptions] = useState([]);
      const [advCorrect, setAdvCorrect] = useState(false);

      const totalAvailableWords = selectedSets.reduce((sum, setId) => sum + WORD_SETS[setId].length, 0);

      useEffect(() => {
        const totalWords = selectedSets.reduce((sum, setId) => sum + WORD_SETS[setId].length, 0);
        if (selectedSets.length === 0) {
          setQuestionCount(0);
        } else if (selectedSets.length === 1) {
          setQuestionCount(totalWords);
        } else {
          setQuestionCount(Math.min(20, totalWords));
        }
      }, [selectedSets]); 

      const toggleSet = (setId) => {
        if (selectedSets.includes(setId)) setSelectedSets(selectedSets.filter(id => id !== setId));
        else setSelectedSets([...selectedSets, setId]);
      };

      const shuffleArray = (originalArray) => {
        const array = [...originalArray];
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      };

      const startGame = () => {
        if (selectedSets.length === 0 || questionCount <= 0) return;

        let combinedWords = [];
        selectedSets.forEach(setId => {
          combinedWords = [...combinedWords, ...WORD_SETS[setId]];
        });

        const shuffledPool = shuffleArray(combinedWords).slice(0, questionCount);
        setGamePool(shuffledPool);
        
        // 重新開始時重置計算
        setAttempts({ correct: 0, total: 0 });

        if (gameMode === 'basic') {
          startBasicLevel(0, shuffledPool);
        } else {
          startAdvancedLevel(0, shuffledPool);
        }
      };

      // ================= 初階模式邏輯 =================
      const startBasicLevel = (lvlIndex, poolOverride) => {
        const activePool = poolOverride || gamePool;
        const startIndex = lvlIndex * 4;
        const items = activePool.slice(startIndex, startIndex + 4);
        
        if (items.length === 0) {
          setGameState('finished');
          return;
        }
        
        setCurrentWords(items);
        let rightShuffled = shuffleArray(items);
        while(rightShuffled.length > 1 && rightShuffled[0].id === items[0].id) {
           rightShuffled = shuffleArray(items);
        }
        setRightSideItems(rightShuffled); 
        setMatches([]);
        setLines([]);
        setSelection(null);
        setLevel(lvlIndex);
        setGameState('playing');
        setAiResponse(null);
      };

      const checkMatch = (leftItem, rightItem) => {
        if (leftItem.id === rightItem.id) {
          const newMatch = { leftId: leftItem.id, rightId: rightItem.id };
          setMatches([...matches, newMatch]);
          setSelection(null);
          
          // 紀錄答對次數
          setAttempts(prev => ({ correct: prev.correct + 1, total: prev.total + 1 }));
          
          if (matches.length + 1 === currentWords.length) {
            setTimeout(() => {
              const maxLevel = Math.ceil(gamePool.length / 4) - 1;
              if (level < maxLevel) startBasicLevel(level + 1);
              else setGameState('finished');
            }, 2000); 
          }
        } else {
          // 答錯邏輯：發出語音並搖晃
          setAttempts(prev => ({ ...prev, total: prev.total + 1 }));
          speakText("答錯囉！再想想");
          setWrongShake([leftItem.id, rightItem.id]);
          setTimeout(() => setWrongShake(null), 500);
          setSelection(null);
        }
      };

      const handleLeftClick = (item) => {
        if (matches.find(m => m.leftId === item.id)) return;
        if (selection && selection.side === 'right') checkMatch(item, selection.item);
        else { setSelection({ side: 'left', item }); setWrongShake(null); }
      };

      const handleRightClick = (item) => {
        if (matches.find(m => m.rightId === item.id)) return;
        if (selection && selection.side === 'left') checkMatch(selection.item, item);
        else { setSelection({ side: 'right', item }); setWrongShake(null); }
      };

      const handleAIClick = async (e, item) => {
        e.stopPropagation();
        setAiLoading(item.id);
        const sentence = await generateSentenceWithGemini(item.char);
        setAiResponse(sentence);
        setAiLoading(null);
        await speakText(sentence);
      };

      useEffect(() => {
        if (gameState !== 'playing' || gameMode !== 'basic') return;

        const drawLines = () => {
          const newLines = [];
          const containerRect = containerRef.current?.getBoundingClientRect();
          if (!containerRect) return;

          matches.forEach(match => {
            const leftEl = leftRefs.current[match.leftId];
            const rightEl = rightRefs.current[match.rightId];
            if (leftEl && rightEl) {
              const leftRect = leftEl.getBoundingClientRect();
              const rightRect = rightEl.getBoundingClientRect();

              const x1 = leftRect.right - containerRect.left;
              const y1 = leftRect.top + leftRect.height / 2 - containerRect.top;
              const x2 = rightRect.left - containerRect.left;
              const y2 = rightRect.top + rightRect.height / 2 - containerRect.top;

              newLines.push({ x1, y1, x2, y2, color: '#22c55e' });
            }
          });
          setLines(newLines);
        };

        drawLines();
        window.addEventListener('resize', drawLines);
        const timer = setTimeout(drawLines, 100);

        return () => {
          window.removeEventListener('resize', drawLines);
          clearTimeout(timer);
        };
      }, [matches, gameState, currentWords, rightSideItems, gameMode]);

      // ================= 進階模式邏輯 =================
      const startAdvancedLevel = (lvlIndex, poolOverride) => {
        const activePool = poolOverride || gamePool;
        if (lvlIndex >= activePool.length) {
          setGameState('finished');
          return;
        }

        const target = activePool[lvlIndex];
        
        let allAvailable = [];
        selectedSets.forEach(setId => {
          allAvailable = [...allAvailable, ...WORD_SETS[setId]];
        });
        const distractors = shuffleArray(allAvailable.filter(w => w.id !== target.id)).slice(0, 3);
        const options = shuffleArray([target, ...distractors]);

        setAdvTarget(target);
        setAdvOptions(options);
        setLevel(lvlIndex);
        setAdvCorrect(false);
        setGameState('playing');
        
        setTimeout(() => playAdvancedAudio(target), 300);
      };

      const playAdvancedAudio = (target) => {
        speakText(`${target.label} 的 ${target.char}`);
      };

      const handleAdvancedClick = (item) => {
        if (advCorrect) return;

        if (item.id === advTarget.id) {
          setAttempts(prev => ({ correct: prev.correct + 1, total: prev.total + 1 }));
          setAdvCorrect(true);
          speakText("答對了！");
          setTimeout(() => {
            startAdvancedLevel(level + 1);
          }, 1500);
        } else {
          setAttempts(prev => ({ ...prev, total: prev.total + 1 }));
          speakText("答錯囉！再想想");
          setWrongShake([item.id]);
          setTimeout(() => setWrongShake(null), 500);
        }
      };
      
      // 計算最後得分與星星
      const calculateScore = () => {
        if (attempts.total === 0) return { accuracy: 0, stars: 0 };
        const rawAccuracy = attempts.correct / attempts.total;
        const accuracy = Math.round(rawAccuracy * 100);
        const rawStars = rawAccuracy * 5;
        const stars = Math.round(rawStars * 2) / 2; // 0.5 進位計算
        return { accuracy, stars };
      };

      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-4">
          {gameState === 'playing' && (
            <button
              onClick={() => { window.speechSynthesis.cancel(); setGameState('intro'); }}
              className="absolute top-4 right-4 md:top-8 md:right-8 flex items-center gap-2 bg-slate-200 hover:bg-slate-300 text-slate-700 py-2 px-4 rounded-full font-bold transition-colors z-50 shadow-sm active:scale-95"
            >
              <Home className="w-5 h-5" /> 回首頁
