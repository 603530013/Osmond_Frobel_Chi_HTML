<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>寶寶識字連連看</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 搖晃動畫設定 */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .animate-shake {
      animation: shake 0.3s ease-in-out;
    }
    /* 隱藏捲軸保持版面乾淨 */
    body {
      overflow-x: hidden;
    }
  </style>
</head>
<body class="bg-slate-50 font-sans select-none">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useReducer } = React;

    // --- 圖示元件 ---
    const Play = ({className, fill="none"}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
    const RotateCcw = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>;
    const Star = ({className, fill="none"}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>;
    const Trophy = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>;
    const Sparkles = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>;
    const Loader2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>;
    const X = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>;
    const Check = ({className, strokeWidth}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth || "2"} strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"></path></svg>;
    const Home = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
    const Volume2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>;

    // API Key
    const apiKey = "";

    // 遊戲資料設定 (多群組題庫)
    const WORD_SETS = {
      'K1B-1': [
        { id: 'wind', char: '風', icon: '🌬️', color: 'bg-blue-100 text-blue-600', label: '風車' },
        { id: 'water', char: '水', icon: '🥛', color: 'bg-cyan-100 text-cyan-600', label: '水杯' },
        { id: 'high', char: '高', icon: '👠', color: 'bg-pink-100 text-pink-600', label: '高跟鞋' },
        { id: 'needle', char: '針', icon: '💉', color: 'bg-slate-200 text-slate-600', label: '針筒' },
        { id: 'hand', char: '手', icon: '✋', color: 'bg-amber-100 text-amber-700', label: '手掌' },
        { id: 'ball', char: '球', icon: '🏀', color: 'bg-orange-100 text-orange-600', label: '籃球' },
        { id: 'cow', char: '牛', icon: '🐄', color: 'bg-stone-200 text-stone-800', label: '乳牛' },
        { id: 'small', char: '小', type: 'custom-dogs-small', color: 'bg-green-100 text-green-700', label: '小狗' },
        { id: 'big', char: '大', type: 'custom-dogs-big', color: 'bg-red-100 text-red-700', label: '大狗' },
        { id: 'flower', char: '花', icon: '🌺', color: 'bg-rose-100 text-rose-600', label: '花朵' },
        { id: 'tea', char: '茶', icon: '🍵', color: 'bg-emerald-100 text-emerald-700', label: '茶壺' },
        { id: 'box', char: '盒', icon: '🎁', color: 'bg-purple-100 text-purple-600', label: '禮物盒' },
        { id: 'eye', char: '眼', icon: '👁️', color: 'bg-yellow-100 text-yellow-800', label: '眼睛' },
        { id: 'door', char: '門', icon: '🚪', color: 'bg-orange-200 text-orange-900', label: '門窗' },
        { id: 'paper', char: '紙', icon: '📄', color: 'bg-gray-100 text-gray-600', label: '紙張' },
        { id: 'jump', char: '跳', type: 'custom-jump', color: 'bg-fuchsia-100 text-fuchsia-600', label: '跳繩' },
      ],
      'K1B-2': [
        { id: 'old', char: '老', icon: '👴', color: 'bg-indigo-100 text-indigo-600', label: '老人' },
        { id: 'teacher', char: '師', icon: '🧑‍🏫', color: 'bg-purple-100 text-purple-600', label: '老師' },
        { id: 'soil', char: '土', type: 'custom-soil', color: 'bg-yellow-200 text-yellow-900', label: '泥土' },
        { id: 'person', char: '人', icon: '🚶', color: 'bg-teal-100 text-teal-600', label: '人類' },
        { id: 'sleep', char: '睡', icon: '🛌', color: 'bg-blue-200 text-blue-800', label: '睡美人' },
        { id: 'circle', char: '圓', icon: '⭕', color: 'bg-red-100 text-red-600', label: '圓形' },
        { id: 'grass', char: '草', icon: '🌿', color: 'bg-green-100 text-green-700', label: '草地' },
        { id: 'rice', char: '飯', icon: '🍚', color: 'bg-stone-100 text-stone-700', label: '吃飯' },
        { id: 'pudding', char: '布', icon: '🍮', color: 'bg-yellow-100 text-yellow-700', label: '布丁' },
        { id: 'trophy', char: '杯', icon: '🏆', color: 'bg-amber-100 text-amber-600', label: '獎杯' },
        { id: 'bird', char: '鳥', icon: '🐦', color: 'bg-sky-100 text-sky-700', label: '小鳥' },
        { id: 'crow', char: '烏', icon: '🐦‍⬛', color: 'bg-zinc-200 text-zinc-800', label: '烏鴉' }
      ]
    };

    // Helper: 呼叫 Gemini 生成造句
    const generateSentenceWithGemini = async (word) => {
      try {
        if (!apiKey) return `(未設定 API Key) 這是${word}。`;
        const response = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{
                parts: [{ text: `請用「${word}」這個字，造一個非常簡單、生動、適合3歲小孩聽的短句。限制15個字以內。只要回傳句子就好，不要其他文字。` }]
              }]
            })
          }
        );
        const data = await response.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text || `這是${word}。`;
      } catch (error) {
        console.error("Gemini Text Error:", error);
        return `這是${word}。`;
      }
    };

    // Helper: 呼叫 Gemini TTS 朗讀 (若無則使用內建)
    const speakText = async (text) => {
      try {
        if (!apiKey) throw new Error("No API Key");
        const response = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: text }] }],
              generationConfig: {
                responseModalities: ["AUDIO"],
                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
              }
            })
          }
        );
        const data = await response.json();
        const audioContent = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
        if (audioContent) {
          const audio = new Audio(`data:audio/mp3;base64,${audioContent}`);
          audio.play();
        }
      } catch (error) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-TW';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
      }
    };

    // 特殊組件：顯示兩隻狗並標示大或小
    const DogComparison = ({ target }) => {
      return (
        <div className="flex items-end justify-center gap-4 h-full w-full pb-2 px-1">
          <div className="relative flex items-center justify-center">
            <span className="text-3xl transform translate-y-1">🐕</span>
            {target === 'small' && (
               <div className="absolute -inset-3 border-4 border-red-500 rounded-full animate-pulse pointer-events-none"></div>
            )}
          </div>
          <div className="relative flex items-center justify-center ml-2">
            <span className="text-6xl">🐕</span>
            {target === 'big' && (
               <div className="absolute -inset-2 border-4 border-red-500 rounded-full animate-pulse pointer-events-none"></div>
            )}
          </div>
        </div>
      );
    };

    // 特殊組件：顯示原地跳躍
    const JumpVisual = () => {
      return (
        <div className="flex flex-col items-center justify-center h-full w-full">
          <div className="relative animate-bounce">
            <div className="absolute -top-6 left-0 right-0 text-center">
               <span className="text-2xl text-fuchsia-500 font-black">↑</span>
            </div>
            <span className="text-6xl">🧍</span>
          </div>
          <div className="w-12 h-1.5 bg-slate-200 rounded-full mt-1 opacity-50 scale-x-75 animate-pulse"></div>
        </div>
      );
    };

    // 特殊組件：小土堆
    const SoilVisual = () => {
      return (
        <div className="flex flex-col items-center justify-center h-full w-full">
          <svg width="60" height="60" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" className="drop-shadow-sm">
            <path d="M 4 56 C 4 56, 12 48, 32 48 C 52 48, 60 56, 60 56 Z" fill="#5C4033" />
            <path d="M 12 52 C 12 52, 20 20, 36 20 C 50 20, 54 52, 54 52 Z" fill="#8B5A2B" />
            <path d="M 22 54 C 22 54, 28 32, 44 32 C 54 32, 58 54, 58 54 Z" fill="#A0522D" />
            <circle cx="34" cy="34" r="2" fill="#3E2723" opacity="0.6"/>
            <circle cx="44" cy="42" r="2.5" fill="#3E2723" opacity="0.6"/>
            <circle cx="28" cy="46" r="1.5" fill="#3E2723" opacity="0.6"/>
            <circle cx="48" cy="48" r="1.5" fill="#3E2723" opacity="0.6"/>
            <circle cx="38" cy="50" r="2" fill="#3E2723" opacity="0.6"/>
          </svg>
        </div>
      );
    };

    // AI 互動泡泡組件
    const AIBubble = ({ text, onClose }) => {
      return (
        <div className="absolute z-50 top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-64 bg-white rounded-2xl shadow-2xl border-4 border-blue-200 p-4 animate-in fade-in zoom-in duration-300">
          <div className="flex justify-between items-start mb-2">
            <div className="flex items-center gap-2 text-blue-600 font-bold">
              <Sparkles className="w-5 h-5 fill-blue-500" />
              <span>AI 老師說...</span>
            </div>
            <button onClick={onClose} className="text-slate-400 hover:text-slate-600">
              <X className="w-5 h-5" />
            </button>
          </div>
          <p className="text-xl font-medium text-slate-700 leading-relaxed text-center">
            {text}
          </p>
        </div>
      );
    };

    const App = () => {
      // 模式與共用狀態
      const [gameMode, setGameMode] = useState('basic'); 
      const [selectedSets, setSelectedSets] = useState([]);
      const [questionCount, setQuestionCount] = useState(0);
      const [gamePool, setGamePool] = useState([]); 
      const [level, setLevel] = useState(0);
      const [gameState, setGameState] = useState('intro');
      const [wrongShake, setWrongShake] = useState(null);
      
      // 計算答對率與星星數狀態
      const [attempts, setAttempts] = useState({ correct: 0, total: 0 });

      // 初階連連看狀態
      const [currentWords, setCurrentWords] = useState([]);
      const [rightSideItems, setRightSideItems] = useState([]);
      const [selection, setSelection] = useState(null);
      const [matches, setMatches] = useState([]);
      const [lines, setLines] = useState([]);
      const [aiLoading, setAiLoading] = useState(null);
      const [aiResponse, setAiResponse] = useState(null);

      const containerRef = useRef(null);
      const leftRefs = useRef({});
      const rightRefs = useRef({});

      // 進階聽音辨字狀態
      const [advTarget, setAdvTarget] = useState(null);
      const [advOptions, setAdvOptions] = useState([]);
      const [advCorrect, setAdvCorrect] = useState(false);

      // 射擊打幽靈模式狀態 (以 ref 儲存，以 tick 觸發重繪)
      const [, forceShooterRender] = useReducer(x => x + 1, 0);
      const shooterRef = useRef({
        fighterX: 50,
        ghosts: [],
        bullets: [],
        heart: null,
        lives: 5,
        level: 0,
        currentTarget: null,
        pool: [],
        allAvailableWords: [],
        roundStartTime: 0,
        gameStartTime: 0,
        lastShootTime: 0,
        lastHeartTime: 0,
        nextId: 1,
        roundActive: false,
        gameActive: false,
        feedback: null,
      });
      const shooterContainerRef = useRef(null);

      const totalAvailableWords = selectedSets.reduce((sum, setId) => sum + WORD_SETS[setId].length, 0);

      useEffect(() => {
        const totalWords = selectedSets.reduce((sum, setId) => sum + WORD_SETS[setId].length, 0);
        if (selectedSets.length === 0) {
          setQuestionCount(0);
        } else if (selectedSets.length === 1) {
          setQuestionCount(totalWords);
        } else {
          setQuestionCount(Math.min(20, totalWords));
        }
      }, [selectedSets]); 

      const toggleSet = (setId) => {
        if (selectedSets.includes(setId)) setSelectedSets(selectedSets.filter(id => id !== setId));
        else setSelectedSets([...selectedSets, setId]);
      };

      const shuffleArray = (originalArray) => {
        const array = [...originalArray];
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      };

      const startGame = () => {
        if (selectedSets.length === 0 || questionCount <= 0) return;

        let combinedWords = [];
        selectedSets.forEach(setId => {
          combinedWords = [...combinedWords, ...WORD_SETS[setId]];
        });

        const shuffledPool = shuffleArray(combinedWords).slice(0, questionCount);
        setGamePool(shuffledPool);
        
        // 重新開始時重置計算
        setAttempts({ correct: 0, total: 0 });

        if (gameMode === 'basic') {
          startBasicLevel(0, shuffledPool);
        } else if (gameMode === 'advanced') {
          startAdvancedLevel(0, shuffledPool);
        } else if (gameMode === 'shooter') {
          startShooterMode(shuffledPool);
        }
      };

      // ================= 初階模式邏輯 =================
      const startBasicLevel = (lvlIndex, poolOverride) => {
        const activePool = poolOverride || gamePool;
        const startIndex = lvlIndex * 4;
        const items = activePool.slice(startIndex, startIndex + 4);
        
        if (items.length === 0) {
          setGameState('finished');
          return;
        }
        
        setCurrentWords(items);
        let rightShuffled = shuffleArray(items);
        while(rightShuffled.length > 1 && rightShuffled[0].id === items[0].id) {
           rightShuffled = shuffleArray(items);
        }
        setRightSideItems(rightShuffled); 
        setMatches([]);
        setLines([]);
        setSelection(null);
        setLevel(lvlIndex);
        setGameState('playing');
        setAiResponse(null);
      };

      const checkMatch = (leftItem, rightItem) => {
        if (leftItem.id === rightItem.id) {
          const newMatch = { leftId: leftItem.id, rightId: rightItem.id };
          setMatches([...matches, newMatch]);
          setSelection(null);
          
          // 紀錄答對次數
          setAttempts(prev => ({ correct: prev.correct + 1, total: prev.total + 1 }));
          
          if (matches.length + 1 === currentWords.length) {
            setTimeout(() => {
              const maxLevel = Math.ceil(gamePool.length / 4) - 1;
              if (level < maxLevel) startBasicLevel(level + 1);
              else setGameState('finished');
            }, 2000); 
          }
        } else {
          // 答錯邏輯：發出語音並搖晃
          setAttempts(prev => ({ ...prev, total: prev.total + 1 }));
          speakText("答錯囉！再想想");
          setWrongShake([leftItem.id, rightItem.id]);
          setTimeout(() => setWrongShake(null), 500);
          setSelection(null);
        }
      };

      const handleLeftClick = (item) => {
        if (matches.find(m => m.leftId === item.id)) return;
        if (selection && selection.side === 'right') checkMatch(item, selection.item);
        else { setSelection({ side: 'left', item }); setWrongShake(null); }
      };

      const handleRightClick = (item) => {
        if (matches.find(m => m.rightId === item.id)) return;
        if (selection && selection.side === 'left') checkMatch(selection.item, item);
        else { setSelection({ side: 'right', item }); setWrongShake(null); }
      };

      const handleAIClick = async (e, item) => {
        e.stopPropagation();
        setAiLoading(item.id);
        const sentence = await generateSentenceWithGemini(item.char);
        setAiResponse(sentence);
        setAiLoading(null);
        await speakText(sentence);
      };

      useEffect(() => {
        if (gameState !== 'playing' || gameMode !== 'basic') return;

        const drawLines = () => {
          const newLines = [];
          const containerRect = containerRef.current?.getBoundingClientRect();
          if (!containerRect) return;

          matches.forEach(match => {
            const leftEl = leftRefs.current[match.leftId];
            const rightEl = rightRefs.current[match.rightId];
            if (leftEl && rightEl) {
              const leftRect = leftEl.getBoundingClientRect();
              const rightRect = rightEl.getBoundingClientRect();

              const x1 = leftRect.right - containerRect.left;
              const y1 = leftRect.top + leftRect.height / 2 - containerRect.top;
              const x2 = rightRect.left - containerRect.left;
              const y2 = rightRect.top + rightRect.height / 2 - containerRect.top;

              newLines.push({ x1, y1, x2, y2, color: '#22c55e' });
            }
          });
          setLines(newLines);
        };

        drawLines();
        window.addEventListener('resize', drawLines);
        const timer = setTimeout(drawLines, 100);

        return () => {
          window.removeEventListener('resize', drawLines);
          clearTimeout(timer);
        };
      }, [matches, gameState, currentWords, rightSideItems, gameMode]);

      // ================= 進階模式邏輯 =================
      const startAdvancedLevel = (lvlIndex, poolOverride) => {
        const activePool = poolOverride || gamePool;
        if (lvlIndex >= activePool.length) {
          setGameState('finished');
          return;
        }

        const target = activePool[lvlIndex];
        
        let allAvailable = [];
        selectedSets.forEach(setId => {
          allAvailable = [...allAvailable, ...WORD_SETS[setId]];
        });
        const distractors = shuffleArray(allAvailable.filter(w => w.id !== target.id)).slice(0, 3);
        const options = shuffleArray([target, ...distractors]);

        setAdvTarget(target);
        setAdvOptions(options);
        setLevel(lvlIndex);
        setAdvCorrect(false);
        setGameState('playing');
        
        setTimeout(() => playAdvancedAudio(target), 300);
      };

      const playAdvancedAudio = (target) => {
        speakText(`${target.label} 的 ${target.char}`);
      };

      const handleAdvancedClick = (item) => {
        if (advCorrect) return;

        if (item.id === advTarget.id) {
          setAttempts(prev => ({ correct: prev.correct + 1, total: prev.total + 1 }));
          setAdvCorrect(true);
          speakText("答對了！");
          setTimeout(() => {
            startAdvancedLevel(level + 1);
          }, 1500);
        } else {
          setAttempts(prev => ({ ...prev, total: prev.total + 1 }));
          speakText("答錯囉！再想想");
          setWrongShake([item.id]);
          setTimeout(() => setWrongShake(null), 500);
        }
      };

      // ================= 射擊打幽靈模式邏輯 =================
      const startShooterMode = (pool) => {
        const ref = shooterRef.current;
        let allAvailable = [];
        selectedSets.forEach(setId => {
          allAvailable = [...allAvailable, ...WORD_SETS[setId]];
        });
        ref.pool = pool;
        ref.allAvailableWords = allAvailable;
        ref.fighterX = 50;
        ref.ghosts = [];
        ref.bullets = [];
        ref.heart = null;
        ref.lives = 5;
        ref.level = 0;
        ref.gameStartTime = performance.now();
        ref.lastShootTime = performance.now();
        ref.lastHeartTime = performance.now();
        ref.nextId = 1;
        ref.feedback = null;
        ref.gameActive = true;
        setLevel(0);
        setGameState('playing');
        startShooterRound(0);
      };

      const startShooterRound = (lvlIndex) => {
        const ref = shooterRef.current;
        if (!ref.gameActive) return;
        if (lvlIndex >= ref.pool.length) {
          setGameState('finished');
          ref.gameActive = false;
          return;
        }

        const target = ref.pool[lvlIndex];
        const distractors = shuffleArray(ref.allAvailableWords.filter(w => w.id !== target.id)).slice(0, 4);
        const ghostCandidates = shuffleArray([target, ...distractors]);

        // 5 個位置均勻分散在水平方向
        const positions = shuffleArray([14, 32, 50, 68, 86]);
        ref.ghosts = ghostCandidates.map((candidate, i) => ({
          id: ref.nextId++,
          char: candidate.char,
          isTarget: candidate.id === target.id,
          x: positions[i] + (Math.random() * 6 - 3),
          baseX: positions[i],
          y: -8 - i * 2,
          wobble: Math.random() * Math.PI * 2,
          wobbleSpeed: 0.03 + Math.random() * 0.03,
        }));
        ref.bullets = [];
        ref.roundStartTime = performance.now();
        ref.roundActive = true;
        ref.currentTarget = target;
        ref.feedback = null;
        ref.level = lvlIndex;

        setLevel(lvlIndex);
        forceShooterRender();

        setTimeout(() => {
          if (shooterRef.current.gameActive) speakText(`${target.label} 的 ${target.char}`);
        }, 300);
      };

      const playShooterAudio = () => {
        const target = shooterRef.current.currentTarget;
        if (target) speakText(`${target.label} 的 ${target.char}`);
      };

      const handleShooterMove = (e) => {
        const container = shooterContainerRef.current;
        if (!container) return;
        const rect = container.getBoundingClientRect();
        const clientX = e.touches?.[0]?.clientX ?? e.clientX;
        if (clientX == null) return;
        const x = ((clientX - rect.left) / rect.width) * 100;
        shooterRef.current.fighterX = Math.max(5, Math.min(95, x));
      };

      // 射擊模式主迴圈
      useEffect(() => {
        if (gameState !== 'playing' || gameMode !== 'shooter') return;

        let rafId;
        const loop = () => {
          const ref = shooterRef.current;
          if (!ref.gameActive) {
            rafId = requestAnimationFrame(loop);
            return;
          }
          const now = performance.now();

          // 子彈上升
          ref.bullets.forEach(b => { b.y -= 2.3; });
          ref.bullets = ref.bullets.filter(b => b.y > -5);

          // 幽靈下降 (10 秒從 -5 到 ~85)
          if (ref.roundActive) {
            const roundElapsed = now - ref.roundStartTime;
            const baseProgress = roundElapsed / 10000;
            ref.ghosts.forEach((g, i) => {
              const startOffset = i * 2;
              g.y = baseProgress * 90 - 8 + startOffset;
              g.wobble += g.wobbleSpeed;
              g.x = g.baseX + Math.sin(g.wobble) * 3;
            });
          }

          // 自動射擊 (每 2 秒)
          if (ref.roundActive && now - ref.lastShootTime >= 2000) {
            ref.bullets.push({
              id: ref.nextId++,
              x: ref.fighterX,
              y: 86
            });
            ref.lastShootTime = now;
          }

          // 愛心補給 (每 30 秒出現一次)
          if (now - ref.lastHeartTime >= 30000 && !ref.heart) {
            ref.heart = {
              id: ref.nextId++,
              x: -6,
              y: 20 + Math.random() * 25,
              startTime: now
            };
            ref.lastHeartTime = now;
          }

          // 愛心橫越 (5 秒)
          if (ref.heart) {
            const heartElapsed = now - ref.heart.startTime;
            if (heartElapsed > 5000) {
              ref.heart = null;
            } else {
              ref.heart.x = (heartElapsed / 5000) * 115 - 7;
            }
          }

          // 碰撞檢測: 子彈 vs 幽靈
          const hitBullets = new Set();
          const hitGhosts = new Set();
          let targetHit = false;
          let wrongHit = false;

          ref.bullets.forEach(b => {
            ref.ghosts.forEach(g => {
              if (hitBullets.has(b.id) || hitGhosts.has(g.id)) return;
              const dx = Math.abs(b.x - g.x);
              const dy = Math.abs(b.y - g.y);
              if (dx < 6 && dy < 7 && g.y > -2 && g.y < 92) {
                hitBullets.add(b.id);
                hitGhosts.add(g.id);
                if (g.isTarget) targetHit = true;
                else wrongHit = true;
              }
            });
          });

          // 碰撞檢測: 子彈 vs 愛心補給
          let heartCollected = false;
          if (ref.heart) {
            ref.bullets.forEach(b => {
              if (hitBullets.has(b.id)) return;
              const dx = Math.abs(b.x - ref.heart.x);
              const dy = Math.abs(b.y - ref.heart.y);
              if (dx < 5 && dy < 7) {
                hitBullets.add(b.id);
                heartCollected = true;
              }
            });
          }

          if (heartCollected) {
            ref.heart = null;
            ref.lives += 1;
          }

          ref.bullets = ref.bullets.filter(b => !hitBullets.has(b.id));
          ref.ghosts = ref.ghosts.filter(g => !hitGhosts.has(g.id));

          // 射錯幽靈 → 扣愛心
          if (wrongHit && ref.roundActive && !targetHit) {
            ref.lives -= 1;
            ref.feedback = 'wrong';
            speakText("射錯了！");
            if (ref.lives <= 0) {
              ref.roundActive = false;
              setAttempts(prev => ({ ...prev, total: prev.total + 1 }));
              setTimeout(() => {
                if (shooterRef.current.gameActive) {
                  shooterRef.current.gameActive = false;
                  setGameState('failed');
                }
              }, 1000);
            } else {
              // 短暫顯示提示後繼續本回合
              setTimeout(() => {
                if (shooterRef.current.gameActive && shooterRef.current.feedback === 'wrong') {
                  shooterRef.current.feedback = null;
                }
              }, 800);
            }
          }

          // 答對 → 進下一題
          if (targetHit && ref.roundActive) {
            ref.roundActive = false;
            ref.feedback = 'correct';
            setAttempts(prev => ({ correct: prev.correct + 1, total: prev.total + 1 }));
            speakText("答對了！");
            const nextLvl = ref.level + 1;
            setTimeout(() => {
              if (shooterRef.current.gameActive) startShooterRound(nextLvl);
            }, 1500);
          }

          // 時間到 → 扣命
          if (ref.roundActive) {
            const roundElapsed = now - ref.roundStartTime;
            if (roundElapsed > 10500) {
              ref.roundActive = false;
              ref.feedback = 'timeout';
              ref.lives -= 1;
              setAttempts(prev => ({ ...prev, total: prev.total + 1 }));
              speakText("時間到囉！");
              const nextLvl = ref.level + 1;
              if (ref.lives <= 0) {
                setTimeout(() => {
                  if (shooterRef.current.gameActive) {
                    shooterRef.current.gameActive = false;
                    setGameState('failed');
                  }
                }, 1000);
              } else {
                setTimeout(() => {
                  if (shooterRef.current.gameActive) startShooterRound(nextLvl);
                }, 1500);
              }
            }
          }

          forceShooterRender();
          rafId = requestAnimationFrame(loop);
        };

        rafId = requestAnimationFrame(loop);
        return () => {
          cancelAnimationFrame(rafId);
        };
      }, [gameState, gameMode]);

      // 計算最後得分與星星
      const calculateScore = () => {
        if (attempts.total === 0) return { accuracy: 0, stars: 0 };
        const rawAccuracy = attempts.correct / attempts.total;
        const accuracy = Math.round(rawAccuracy * 100);
        const rawStars = rawAccuracy * 5;
        const stars = Math.round(rawStars * 2) / 2; // 0.5 進位計算
        return { accuracy, stars };
      };

      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-4">
          {gameState === 'playing' && (
            <button
              onClick={() => { window.speechSynthesis.cancel(); shooterRef.current.gameActive = false; setGameState('intro'); }}
              className="absolute top-4 right-4 md:top-8 md:right-8 flex items-center gap-2 bg-slate-200 hover:bg-slate-300 text-slate-700 py-2 px-4 rounded-full font-bold transition-colors z-50 shadow-sm active:scale-95"
            >
              <Home className="w-5 h-5" /> 回首頁
            </button>
          )}

          {aiResponse && (
            <div className="fixed inset-0 bg-black/20 z-50 flex items-center justify-center" onClick={() => setAiResponse(null)}>
               <AIBubble text={aiResponse} onClose={() => setAiResponse(null)} />
            </div>
          )}

          <div className="mb-6 text-center mt-8 md:mt-0">
            <h1 className="text-3xl md:text-4xl font-black text-blue-600 mb-2 tracking-wider flex items-center justify-center gap-2">
              寶寶識字連連看 
              <span className="text-sm bg-blue-100 text-blue-600 px-2 py-1 rounded-full border border-blue-200 flex items-center gap-1">
                AI 老師版 <Sparkles className="w-3 h-3 fill-yellow-400 text-yellow-400"/>
              </span>
            </h1>
            <p className="text-slate-500 text-lg font-medium">
              {gameState === 'playing'
                ? (gameMode === 'basic'
                    ? `連連看 第 ${level + 1} 關 (共 ${Math.ceil(gamePool.length / 4)} 關)`
                    : gameMode === 'advanced'
                      ? `聽音辨字 第 ${level + 1} 題 (共 ${gamePool.length} 題)`
                      : `打幽靈 第 ${level + 1} 題 (共 ${gamePool.length} 題)`)
                : '快樂學習認字'}
            </p>
          </div>

          <div className="relative w-full max-w-2xl bg-white rounded-3xl shadow-xl border-4 border-blue-100 p-6 md:p-10 min-h-[500px] flex flex-col justify-center">
            
            {/* 首頁 */}
            {gameState === 'intro' && (
              <div className="flex flex-col items-center justify-center h-full space-y-5">
                
                {/* 遊戲模式選擇 */}
                <div className="w-full max-w-md bg-slate-100 p-2 rounded-2xl grid grid-cols-3 gap-2">
                  <button
                    onClick={() => setGameMode('basic')}
                    className={`py-3 px-2 rounded-xl font-bold text-sm md:text-base transition-all ${
                      gameMode === 'basic' ? 'bg-white text-blue-600 shadow-md border-2 border-blue-200' : 'text-slate-500 hover:bg-slate-200 border-2 border-transparent'
                    }`}
                  >
                    🧩 連連看
                  </button>
                  <button
                    onClick={() => setGameMode('advanced')}
                    className={`py-3 px-2 rounded-xl font-bold text-sm md:text-base transition-all ${
                      gameMode === 'advanced' ? 'bg-white text-blue-600 shadow-md border-2 border-blue-200' : 'text-slate-500 hover:bg-slate-200 border-2 border-transparent'
                    }`}
                  >
                    👂 聽音辨字
                  </button>
                  <button
                    onClick={() => setGameMode('shooter')}
                    className={`py-3 px-2 rounded-xl font-bold text-sm md:text-base transition-all ${
                      gameMode === 'shooter' ? 'bg-white text-red-600 shadow-md border-2 border-red-200' : 'text-slate-500 hover:bg-slate-200 border-2 border-transparent'
                    }`}
                  >
                    🚀 打幽靈
                  </button>
                </div>

                <div className="w-full max-w-sm h-px bg-slate-200 my-1"></div>

                <h2 className="text-xl font-bold text-slate-700">1. 請選擇要挑戰的題庫 (可多選)：</h2>
                <div className="flex flex-wrap justify-center gap-3 w-full max-w-md">
                  {Object.keys(WORD_SETS).map(setId => (
                    <button 
                      key={setId}
                      onClick={() => toggleSet(setId)}
                      className={`flex items-center justify-center gap-2 text-lg font-bold py-2 px-4 rounded-2xl border-4 transition-all transform active:scale-95 ${
                        selectedSets.includes(setId) 
                          ? 'bg-blue-100 border-blue-500 text-blue-700 shadow-sm' 
                          : 'bg-white border-slate-200 text-slate-500 hover:border-blue-300'
                      }`}
                    >
                      <div className={`w-5 h-5 rounded border-2 flex items-center justify-center ${selectedSets.includes(setId) ? 'bg-blue-500 border-blue-500' : 'border-slate-300'}`}>
                        {selectedSets.includes(setId) && <Check className="w-3 h-3 text-white" strokeWidth="4" />}
                      </div>
                      {setId} ({WORD_SETS[setId].length}字)
                    </button>
                  ))}
                </div>

                <div className="w-full max-w-sm h-px bg-slate-200 my-1"></div>

                <h2 className="text-xl font-bold text-slate-700">2. 選擇出題數量：</h2>
                <div className="flex flex-col items-center w-full max-w-sm bg-slate-50 p-4 rounded-2xl border-2 border-slate-100">
                  <div className="text-4xl font-black text-blue-500 mb-2">
                    {questionCount} <span className="text-lg text-slate-400 font-normal">/ {totalAvailableWords} 題</span>
                  </div>
                  <input 
                    type="range" 
                    min={Math.min(1, totalAvailableWords)} 
                    max={totalAvailableWords} 
                    value={questionCount} 
                    onChange={(e) => setQuestionCount(parseInt(e.target.value))}
                    disabled={totalAvailableWords === 0}
                    className="w-full h-3 bg-slate-300 rounded-lg appearance-none cursor-pointer accent-blue-500"
                  />
                  <p className="text-sm text-slate-400 mt-2">將會從所選題庫中隨機出題</p>
                </div>

                <button 
                  onClick={startGame}
                  disabled={selectedSets.length === 0 || questionCount === 0}
                  className="flex items-center justify-center gap-2 bg-blue-500 hover:bg-blue-600 disabled:bg-slate-300 disabled:transform-none text-white text-2xl font-bold py-4 px-12 rounded-full shadow-lg transition-transform transform active:scale-95 mt-2"
                >
                  <Play className="w-7 h-7" fill="currentColor" /> 開始遊戲
                </button>
              </div>
            )}

            {/* 完成畫面 */}
            {gameState === 'finished' && (
              <div className="flex flex-col items-center justify-center h-full space-y-4 text-center">
                <Trophy className="w-24 h-24 text-yellow-400 drop-shadow-lg" />
                <h2 className="text-4xl font-bold text-slate-800">太棒了！</h2>
                <p className="text-xl text-slate-600">你完成了這次的學習！</p>
                
                {/* 顯示答對率與星星數 */}
                <div className="bg-slate-50 p-4 rounded-2xl w-full max-w-sm border-2 border-slate-100 my-2 shadow-sm">
                  <p className="text-2xl font-black text-blue-500 mb-3">答對率：{calculateScore().accuracy}%</p>
                  <div className="flex justify-center gap-2">
                    {[1, 2, 3, 4, 5].map((starIdx) => {
                      const { stars } = calculateScore();
                      const delay = `${(starIdx - 1) * 100}ms`;
                      
                      if (stars >= starIdx) {
                        // 全星
                        return <Star key={starIdx} fill="currentColor" className="w-10 h-10 animate-pulse text-yellow-400" style={{animationDelay: delay}} />;
                      } else if (stars + 0.5 === starIdx) {
                        // 半星
                        return (
                          <div key={starIdx} className="relative w-10 h-10 animate-pulse" style={{animationDelay: delay}}>
                            <Star fill="none" className="absolute top-0 left-0 w-10 h-10 text-slate-200" />
                            <div className="absolute top-0 left-0 h-10 overflow-hidden" style={{ width: '50%' }}>
                              <Star fill="currentColor" className="w-10 h-10 text-yellow-400" />
                            </div>
                          </div>
                        );
                      } else {
                        // 空星
                        return <Star key={starIdx} fill="none" className="w-10 h-10 animate-pulse text-slate-200" style={{animationDelay: delay}} />;
                      }
                    })}
                  </div>
                </div>

                <button
                  onClick={() => { shooterRef.current.gameActive = false; setGameState('intro'); }}
                  className="flex items-center gap-2 bg-green-500 hover:bg-green-600 text-white text-xl font-bold py-3 px-8 rounded-full shadow-lg mt-4 transition-transform active:scale-95"
                >
                  <RotateCcw className="w-6 h-6" /> 回首頁選題
                </button>
              </div>
            )}

            {/* 失敗畫面 (射擊模式生命用盡) */}
            {gameState === 'failed' && (
              <div className="flex flex-col items-center justify-center h-full space-y-4 text-center">
                <div className="text-8xl drop-shadow-lg animate-pulse">💔</div>
                <h2 className="text-4xl font-bold text-red-500">遊戲結束</h2>
                <p className="text-xl text-slate-600">愛心用完了，再接再厲！</p>

                <div className="bg-slate-50 p-4 rounded-2xl w-full max-w-sm border-2 border-slate-100 my-2 shadow-sm">
                  <p className="text-lg text-slate-600 mb-1">已打倒目標數</p>
                  <p className="text-3xl font-black text-blue-500 mb-2">{attempts.correct} <span className="text-lg text-slate-400 font-normal">題</span></p>
                  <p className="text-lg text-slate-600 mb-1">答對率</p>
                  <p className="text-2xl font-black text-green-500">{calculateScore().accuracy}%</p>
                </div>

                <button
                  onClick={() => { shooterRef.current.gameActive = false; setGameState('intro'); }}
                  className="flex items-center gap-2 bg-blue-500 hover:bg-blue-600 text-white text-xl font-bold py-3 px-8 rounded-full shadow-lg mt-4 transition-transform active:scale-95"
                >
                  <RotateCcw className="w-6 h-6" /> 再試一次
                </button>
              </div>
            )}

            {/* 遊戲畫面 - 初階模式 (連連看) */}
            {gameState === 'playing' && gameMode === 'basic' && (
              <div className="relative w-full h-full flex justify-between items-stretch" ref={containerRef}>
                
                <svg className="absolute top-0 left-0 w-full h-full pointer-events-none z-10 overflow-visible">
                  {lines.map((line, i) => (
                    <line 
                      key={i}
                      x1={line.x1} y1={line.y1}
                      x2={line.x2} y2={line.y2}
                      stroke={line.color}
                      strokeWidth="6"
                      strokeLinecap="round"
                      className="drop-shadow-sm transition-all duration-500 ease-out"
                    />
                  ))}
                  {selection && (
                      <circle cx="0" cy="0" r="0" />
                  )}
                </svg>

                <div className="flex flex-col justify-between w-1/3 z-20 space-y-4">
                  {currentWords.map((item) => {
                    const isMatched = matches.find(m => m.leftId === item.id);
                    const isSelected = selection?.side === 'left' && selection.item.id === item.id;
                    const isShake = wrongShake?.includes(item.id);
                    const isLoading = aiLoading === item.id;
                    
                    return (
                      <div key={item.id} className="relative h-24">
                        <button
                          ref={el => leftRefs.current[item.id] = el}
                          onClick={() => handleLeftClick(item)}
                          disabled={!!isMatched}
                          className={`
                            w-full h-full rounded-2xl border-4 transition-all duration-300 transform
                            flex items-center justify-center shadow-sm
                            ${isMatched 
                              ? 'bg-green-100 border-green-400 opacity-100' 
                              : isSelected 
                                ? 'bg-blue-50 border-blue-500 scale-105 shadow-lg ring-4 ring-blue-200' 
                                : 'bg-white border-slate-200 hover:border-blue-300 active:scale-95'
                            }
                            ${isShake ? 'animate-shake border-red-400 bg-red-50' : ''}
                          `}
                        >
                          <span className="text-5xl md:text-6xl font-black text-slate-800">
                            {item.char}
                          </span>
                        </button>
                        
                        {isMatched && (
                          <button 
                            onClick={(e) => handleAIClick(e, item)}
                            disabled={isLoading}
                            className="absolute -top-3 -right-3 w-10 h-10 bg-yellow-400 hover:bg-yellow-500 text-white rounded-full flex items-center justify-center shadow-lg transform hover:scale-110 transition-all z-30 ring-2 ring-white"
                            title="聽 AI 老師造句"
                          >
                            {isLoading ? (
                              <Loader2 className="w-5 h-5 animate-spin text-white" />
                            ) : (
                              <Sparkles className="w-5 h-5 text-white fill-current" />
                            )}
                          </button>
                        )}
                      </div>
                    );
                  })}
                </div>

                <div className="flex flex-col justify-between w-1/3 z-20 space-y-4">
                  {rightSideItems.map((item) => {
                    const isMatched = matches.find(m => m.rightId === item.id);
                    const isSelected = selection?.side === 'right' && selection.item.id === item.id;
                    const isShake = wrongShake?.includes(item.id);

                    return (
                      <button
                        key={item.id}
                        ref={el => rightRefs.current[item.id] = el}
                        onClick={() => handleRightClick(item)}
                        disabled={!!isMatched}
                        className={`
                          relative h-24 rounded-2xl border-4 transition-all duration-300 transform
                          flex items-center justify-center shadow-sm overflow-hidden
                          ${isMatched 
                            ? 'bg-green-50 border-green-400 opacity-80 scale-95' 
                            : isSelected
                              ? 'bg-blue-50 border-blue-500 scale-105 shadow-lg ring-4 ring-blue-200'
                              : 'bg-white border-slate-200 hover:border-amber-300 active:scale-95'
                          }
                          ${isShake ? 'animate-shake border-red-400 bg-red-50' : ''}
                        `}
                      >
                        {item.type === 'custom-jump' ? (
                           <JumpVisual />
                        ) : item.type === 'custom-soil' ? (
                           <SoilVisual />
                        ) : item.type && item.type.includes('custom-dogs') ? (
                          <DogComparison target={item.type === 'custom-dogs-small' ? 'small' : 'big'} />
                        ) : (
                          <span className="text-5xl md:text-6xl drop-shadow-sm filter">
                            {item.icon}
                          </span>
                        )}
                        <span className="sr-only">{item.label}</span>
                      </button>
                    );
                  })}
                </div>

              </div>
            )}

            {/* 遊戲畫面 - 進階模式 (聽音辨字) */}
            {gameState === 'playing' && gameMode === 'advanced' && advTarget && (
              <div className="flex flex-col items-center justify-center h-full space-y-8 w-full animate-in fade-in duration-500">

                {/* 語音播放按鈕 */}
                <button
                  onClick={() => playAdvancedAudio(advTarget)}
                  className="flex flex-col items-center justify-center p-6 bg-blue-50 text-blue-500 hover:bg-blue-100 hover:text-blue-600 rounded-full border-4 border-blue-200 transition-all active:scale-95 shadow-md group"
                >
                  <Volume2 className="w-20 h-20 md:w-24 md:h-24 group-hover:scale-110 transition-transform" />
                  <span className="text-xl font-bold mt-2">再聽一次</span>
                </button>

                {/* 4選1 字卡 */}
                <div className="grid grid-cols-2 gap-4 md:gap-6 w-full max-w-md">
                  {advOptions.map(item => {
                    const isTarget = item.id === advTarget.id;
                    const isShake = wrongShake?.includes(item.id);
                    const showCorrect = advCorrect && isTarget;

                    return (
                      <button
                        key={item.id}
                        onClick={() => handleAdvancedClick(item)}
                        className={`h-32 md:h-40 text-6xl md:text-7xl font-black rounded-3xl border-4 flex items-center justify-center transition-all duration-300
                          ${showCorrect
                            ? 'bg-green-100 border-green-500 text-green-700 scale-105 shadow-xl ring-4 ring-green-200'
                            : 'bg-white border-slate-200 text-slate-800 shadow-sm hover:border-blue-300 hover:shadow-md active:scale-95'
                          }
                          ${isShake ? 'animate-shake border-red-400 bg-red-50 text-red-700' : ''}
                        `}
                      >
                        {item.char}
                      </button>
                    );
                  })}
                </div>

              </div>
            )}

            {/* 遊戲畫面 - 射擊模式 (打幽靈) */}
            {gameState === 'playing' && gameMode === 'shooter' && shooterRef.current.currentTarget && (
              <div className="flex flex-col items-center justify-center h-full w-full animate-in fade-in duration-500">

                {/* 題目顯示 */}
                <div className="flex items-center gap-3 mb-3 w-full justify-center flex-wrap">
                  <button
                    onClick={playShooterAudio}
                    className="p-2 bg-blue-500 hover:bg-blue-600 text-white rounded-full shadow-md active:scale-95"
                    title="再聽一次"
                  >
                    <Volume2 className="w-5 h-5" />
                  </button>
                  <div className="text-base md:text-lg font-bold text-slate-700">
                    射擊幽靈！
                  </div>
                </div>

                {/* 遊戲區域 */}
                <div
                  ref={shooterContainerRef}
                  onMouseMove={handleShooterMove}
                  onTouchMove={(e) => { e.preventDefault(); handleShooterMove(e); }}
                  onTouchStart={(e) => { e.preventDefault(); handleShooterMove(e); }}
                  className="relative w-full h-[420px] md:h-[460px] rounded-2xl overflow-hidden cursor-none border-4 border-slate-800 shadow-inner"
                  style={{
                    touchAction: 'none',
                    background: 'linear-gradient(180deg, #0f172a 0%, #312e81 35%, #581c87 70%, #1e1b4b 100%)'
                  }}
                >
                  {/* 星空背景 */}
                  <div className="absolute inset-0 opacity-70 pointer-events-none">
                    {[...Array(35)].map((_, i) => (
                      <div key={i} className="absolute bg-white rounded-full animate-pulse"
                           style={{
                             left: `${(i * 37) % 100}%`,
                             top: `${(i * 53) % 100}%`,
                             width: `${1 + (i % 3)}px`,
                             height: `${1 + (i % 3)}px`,
                             animationDelay: `${(i % 10) * 0.2}s`,
                             opacity: 0.4 + (i % 5) * 0.12,
                           }} />
                    ))}
                  </div>

                  {/* 愛心數 (右上角) */}
                  <div className="absolute top-2 right-2 flex items-center gap-0.5 bg-black/40 px-2.5 py-1 rounded-full z-30 backdrop-blur-sm">
                    {shooterRef.current.lives > 0 ? (
                      <>
                        {Array.from({length: Math.min(shooterRef.current.lives, 6)}).map((_, i) => (
                          <span key={i} className="text-lg md:text-xl">❤️</span>
                        ))}
                        {shooterRef.current.lives > 6 && (
                          <span className="text-white font-black text-sm ml-1">×{shooterRef.current.lives}</span>
                        )}
                      </>
                    ) : (
                      <span className="text-lg opacity-40">🖤</span>
                    )}
                  </div>

                  {/* 關卡顯示 (左上角) */}
                  <div className="absolute top-2 left-2 bg-black/40 px-3 py-1 rounded-full z-30 text-white font-bold text-xs md:text-sm backdrop-blur-sm">
                    第 {level + 1} / {shooterRef.current.pool.length} 題
                  </div>

                  {/* 幽靈 */}
                  {shooterRef.current.ghosts.map(g => (
                    <div key={g.id}
                         className="absolute z-20 pointer-events-none"
                         style={{
                           left: `${g.x}%`,
                           top: `${g.y}%`,
                           transform: 'translateX(-50%)'
                         }}>
                      <div className="relative flex flex-col items-center">
                        <span className="text-5xl md:text-6xl drop-shadow-[0_0_10px_rgba(200,220,255,0.6)]" style={{filter: 'grayscale(0.2)'}}>👻</span>
                        <span className="absolute top-3 md:top-4 left-1/2 -translate-x-1/2 text-lg md:text-xl font-black text-slate-900 bg-yellow-200 rounded-full w-8 h-8 md:w-9 md:h-9 flex items-center justify-center border-2 border-yellow-500 shadow-md">
                          {g.char}
                        </span>
                      </div>
                    </div>
                  ))}

                  {/* 子彈 */}
                  {shooterRef.current.bullets.map(b => (
                    <div key={b.id}
                         className="absolute w-2 h-5 rounded-full z-10 pointer-events-none"
                         style={{
                           left: `${b.x}%`,
                           top: `${b.y}%`,
                           transform: 'translateX(-50%)',
                           background: 'linear-gradient(180deg, #fff7a0 0%, #facc15 40%, #f97316 100%)',
                           boxShadow: '0 0 12px rgba(250,204,21,0.9), 0 0 20px rgba(249,115,22,0.5)'
                         }} />
                  ))}

                  {/* 愛心補給 */}
                  {shooterRef.current.heart && (
                    <div className="absolute text-4xl md:text-5xl z-20 pointer-events-none animate-bounce"
                         style={{
                           left: `${shooterRef.current.heart.x}%`,
                           top: `${shooterRef.current.heart.y}%`,
                           transform: 'translateX(-50%)',
                           filter: 'drop-shadow(0 0 8px rgba(255,100,150,0.9))'
                         }}>
                      💖
                    </div>
                  )}

                  {/* 戰鬥機 */}
                  <div className="absolute bottom-1 z-20 pointer-events-none transition-[left] duration-75 ease-linear"
                       style={{
                         left: `${shooterRef.current.fighterX}%`,
                         transform: 'translateX(-50%)'
                       }}>
                    <span className="text-5xl md:text-6xl drop-shadow-[0_0_8px_rgba(255,255,255,0.7)]">🚀</span>
                  </div>

                  {/* 回饋提示 */}
                  {shooterRef.current.feedback === 'correct' && (
                    <div className="absolute inset-0 flex items-center justify-center z-40 pointer-events-none">
                      <div className="bg-green-500 text-white text-3xl md:text-4xl font-black px-6 py-3 rounded-2xl shadow-2xl border-4 border-green-300 animate-pulse">
                        ✓ 答對了！
                      </div>
                    </div>
                  )}
                  {shooterRef.current.feedback === 'wrong' && (
                    <div className="absolute inset-0 flex items-center justify-center z-40 pointer-events-none">
                      <div className="bg-orange-500 text-white text-2xl md:text-3xl font-black px-6 py-3 rounded-2xl shadow-2xl border-4 border-orange-300 animate-pulse">
                        ✗ 射錯了！-1 ❤️
                      </div>
                    </div>
                  )}
                  {shooterRef.current.feedback === 'timeout' && (
                    <div className="absolute inset-0 flex items-center justify-center z-40 pointer-events-none">
                      <div className="bg-red-500 text-white text-2xl md:text-3xl font-black px-6 py-3 rounded-2xl shadow-2xl border-4 border-red-300 animate-pulse">
                        💔 漏掉了！
                      </div>
                    </div>
                  )}
                </div>

                <p className="text-xs md:text-sm text-slate-500 mt-2 text-center">
                  👆 移動滑鼠／手指控制戰鬥機 · 砲彈每 2 秒自動發射 · 射中 💖 補血！
                </p>
              </div>
            )}

          </div>

          <div className="mt-8 text-slate-400 text-sm text-center max-w-lg">
            {gameMode === 'basic' ? (
              <span>適合年齡：3-6 歲 | 點擊配對成功的字卡上方的 <Sparkles className="inline w-4 h-4 fill-yellow-400 text-yellow-400"/> 可聽 AI 老師造句喔！</span>
            ) : gameMode === 'advanced' ? (
              <span>打開設備音量，聽聽看系統念出的詞語，並選出正確的國字！</span>
            ) : (
              <span>聽題目後，移動戰鬥機瞄準包含目標字的小幽靈！預設 5 條命，每 30 秒會有 💖 補給從左飛到右。</span>
            )}
          </div>
        </div>
      );
    };

    // 掛載 React 應用程式到根節點
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
